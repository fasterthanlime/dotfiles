"$schema" = 'https://starship.rs/config-schema.json'

# Put hostname at the end of the prompt (right before newline/character)
format = """
$directory\
$git_branch\
$git_status\
$c\
$golang\
$java\
$kotlin\
$python\
$zig\
$nix_shell\
$conda\
$cmd_duration\
$hostname\
$time\
$line_break\
$character"""

# Don't show username, but show hostname with a prominent icon when remote
[username]
disabled = true

[hostname]
ssh_only = false
ssh_symbol = "¾░ŻĆ"
style = "bold #D47766"
format = "[ $ssh_symbol $hostname]($style)"

# Disable version info I don't care about
[package]
disabled = true

[rust]
disabled = true

# Melange dark palette colors
[character]
success_symbol = "[ŌĆ║](bold #85B695)"
error_symbol = "[ŌĆ║](bold #D47766)"

[directory]
style = "bold #C1A78E"
format = "[ $path]($style)[$read_only]($read_only_style)"
read_only = " ¾░īŠ"
read_only_style = "bold #D47766"

[git_branch]
symbol = ""
style = "bold #85B695"
format = " [ŌĆ║$symbol $branch(:$remote_branch)]($style) "

[cmd_duration]
min_time = 500
style = "bold #867462"
format = " [ŌĆ║ took $duration]($style)"

[time]
disabled = false
style = "bold #867462"
format = " [ŌĆ║ $time ­¤¬┤]($style)"
time_format = "%H:%M"

[git_status]
style = "bold #E49B5D"
format = '([$all_status$ahead_behind]($style))'
staged = '[¾░ÉĢ $count](bold #85B695)'
modified = '[¾░Å½ $count](bold #EBC06D)'
untracked = '[¾░ŗŚ $count](bold #89B3B6)'
deleted = '[¾░ŹČ $count](bold #D47766)'
conflicted = '[¾░Ć© $count](bold #D47766)'
ahead = '[¾░üØ $count](bold #85B695)'
behind = '[¾░üģ $count](bold #D47766)'
diverged = '[¾░üØ $ahead_count ¾░üģ $behind_count](bold #E49B5D)'
stashed = '[¾░ÅŚ $count](bold #A3A9CE)'

[git_commit]
tag_symbol = '  '

